<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>VS 生长机制演示</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { width: 800px; height: 400px; background: white; border: 2px solid #003366; border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .title { position: absolute; top: 20px; left: 30px; color: #003366; font-size: 24px; font-weight: bold; z-index: 10; }
    
    /* 区域划分 */
    .hot-zone { position: absolute; left: 0; width: 40%; height: 100%; background: linear-gradient(90deg, rgba(255,100,100,0.2) 0%, rgba(255,255,255,0) 100%); }
    .cold-zone { position: absolute; right: 0; width: 40%; height: 100%; background: linear-gradient(-90deg, rgba(100,150,255,0.2) 0%, rgba(255,255,255,0) 100%); }
    .temp-label-hot { position: absolute; bottom: 20px; left: 30px; color: #dc2626; font-weight: bold; }
    .temp-label-cold { position: absolute; bottom: 20px; right: 30px; color: #2563eb; font-weight: bold; }

    /* 原料粉末 */
    .powder { position: absolute; top: 60%; left: 10%; width: 60px; height: 20px; background: #64748b; border-radius: 10px 10px 0 0; }
    
    /* 气相传输动画 */
    .vapor { position: absolute; width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; opacity: 0; }
    @keyframes transport {
        0% { transform: translate(0, 0); opacity: 1; }
        50% { transform: translate(250px, -50px); opacity: 0.8; }
        100% { transform: translate(500px, 0px); opacity: 0; }
    }
    
    /* 纳米带生长动画 */
    .substrate { position: absolute; top: 60%; right: 10%; width: 80px; height: 8px; background: #334155; }
    .nanobelt { position: absolute; bottom: 40%; right: 12%; width: 0px; height: 25px; background: #003366; box-shadow: inset 0 0 5px rgba(255,255,255,0.5); opacity: 0; }
    @keyframes grow {
        0% { width: 0px; opacity: 0; }
        10% { opacity: 1; width: 10px; }
        100% { width: 180px; opacity: 1; }
    }

    /* 按钮 */
    .btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: #003366; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .btn:hover { background: #005599; }
</style>
</head>
<body>

<div class="container">
    <div class="title">气-固 (Vapor-Solid) 生长机制动画</div>
    <div class="hot-zone"></div>
    <div class="cold-zone"></div>
    <div class="temp-label-hot">高温区 (蒸发源)</div>
    <div class="temp-label-cold">低温区 (基底沉积)</div>
    
    <div class="powder"></div>
    <div class="substrate"></div>
    <div class="nanobelt" id="belt"></div>
    
    <div id="vapor-container"></div>
    
    <button class="btn" onclick="startAnimation()">播放生长过程</button>
</div>

<script>
    function startAnimation() {
        const vaporContainer = document.getElementById('vapor-container');
        vaporContainer.innerHTML = ''; 
        
        // 重置并触发纳米带生长
        const belt = document.getElementById('belt');
        belt.style.animation = 'none';
        belt.offsetHeight; /* 触发重绘 */
        belt.style.animation = 'grow 5s forwards linear';
        belt.style.animationDelay = '1s';

        // 生成蒸汽粒子
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const vapor = document.createElement('div');
                vapor.className = 'vapor';
                vapor.style.top = (60 - Math.random() * 10) + '%';
                vapor.style.left = (12 + Math.random() * 5) + '%';
                vapor.style.animation = `transport 2s forwards cubic-bezier(0.4, 0, 0.2, 1)`;
                vaporContainer.appendChild(vapor);
            }, i * 150); // 连续喷射
        }
    }
</script>
</body>
</html>
